# Prod-image smoke tests — builds all services with target: prod and waits
# for healthchecks. Run locally or in CI via:
#   COMPOSE_FILE=compose.prod-smoke.yaml bin/ci

services:
  registry:
    build:
      context: ./registry
      target: prod
    environment:
      REGISTRY_PROFILES: "api,switchboard"

  registry-git:
    build:
      context: ./registry
      target: prod
    environment:
      REGISTRY_BACKEND: "git"
      REGISTRY_BACKEND_GIT_SSH_PRIVATE_KEY: "dummy"
    command: >-
      sh -c '
        bin/docker/entrypoint.sh python3 -c "
        import os, pathlib
        key = pathlib.Path(os.environ[\"REGISTRY_BACKEND_GIT_SSH_KEY_PATH\"])
        assert key.exists(), f\"SSH key not written: {key}\"
        cmd = os.environ.get(\"GIT_SSH_COMMAND\", \"\")
        assert str(key) in cmd, f\"GIT_SSH_COMMAND missing key: {cmd}\"
        assert \"StrictHostKeyChecking\" in cmd, f\"GIT_SSH_COMMAND missing host check: {cmd}\"
        print(\"registry-git smoke: ok\")
        "
      '

  player:
    build:
      context: ./player
      target: prod
    depends_on:
      registry:
        condition: service_healthy
    environment:
      RADIOPAD_REGISTRY_URL: "http://registry:8000/api/"
      RADIOPAD_PLAYER: "smoke/test"

  remote-control:
    build:
      context: ./remote-control
      target: prod

  integration-tests:
    profiles:
      - tests
    image: busybox:latest
    depends_on:
      registry:
        condition: service_healthy
      registry-git:
        condition: service_completed_successfully
      player:
        condition: service_healthy
      remote-control:
        condition: service_healthy
    command: ["echo", "All prod services healthy"]
