# Prod-image smoke tests — builds all services with target: prod and waits
# for healthchecks. Run locally or in CI via:
#   COMPOSE_FILE=compose.prod-smoke.yaml bin/ci

services:
  registry:
    build:
      context: ./registry
      target: prod
    environment:
      REGISTRY_PROFILES: "api,switchboard"

  registry-git:
    build:
      context: ./registry
      target: prod
    environment:
      REGISTRY_BACKEND: "git"
      REGISTRY_BACKEND_GIT_SSH_PRIVATE_KEY: "dummy"
    volumes:
      - ./tests/smoke_registry_git.py:/tmp/smoke_registry_git.py:ro
    command: ["bin/docker/entrypoint.sh", "python3", "/tmp/smoke_registry_git.py"]

  player:
    build:
      context: ./player
      target: prod
    depends_on:
      registry:
        condition: service_healthy
    environment:
      RADIOPAD_REGISTRY_URL: "http://registry:8000/api/"
      RADIOPAD_PLAYER: "briceburg/living-room"

  remote-control:
    build:
      context: ./remote-control
      target: prod

  integration-tests:
    profiles:
      - tests
    image: busybox:1
    depends_on:
      registry:
        condition: service_healthy
      registry-git:
        condition: service_completed_successfully
      player:
        condition: service_healthy
      remote-control:
        condition: service_healthy
    command: ["echo", "All prod services healthy"]
