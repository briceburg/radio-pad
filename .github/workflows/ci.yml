name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - macropad-control
          - player
          - registry
    defaults:
      run:
        working-directory: ./${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: ./${{ matrix.project }}/requirements*.txt
      - name: Install dependencies
        run: |
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "requirements-dev.txt" ]; then pip install -r requirements-dev.txt; fi
      - name: Run CI checks
        run: bin/ci

  node-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - remote-control
    defaults:
      run:
        working-directory: ./${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run CI
        run: bin/ci

  integration-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compose_file: compose.yaml
            project: radiopad-ci
          - compose_file: compose.split.yaml
            project: radiopad-split-ci
    steps:
      - uses: actions/checkout@v4
      - name: Run compose integration tests
        env:
          COMPOSE_FILE: ${{ matrix.compose_file }}
          COMPOSE_PROJECT_NAME: ${{ matrix.project }}
          CI_CLEANUP: "false"
        run: bin/ci
