<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>RadioPad</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script type="module" src="/js/app.js"></script>

    <link rel="icon" type="image/x-icon" href="./assets/icon/favicon.ico" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta name="theme-color" content="#31d53d" />
    <link rel="source" href="https://github.com/briceburg/radio-pad" />
  </head>
  <body>
    <ion-app>
      <ion-tabs>
        <!-- navbar -->
        <ion-tab-bar slot="bottom">
          <ion-tab-button tab="control">
            <ion-icon name="radio-outline"></ion-icon>
            Control
          </ion-tab-button>
          <ion-tab-button tab="listen">
            <ion-icon name="headset-outline"></ion-icon>
            Listen
          </ion-tab-button>
          <ion-tab-button tab="settings">
            <ion-icon name="settings-outline"></ion-icon>
            Settings
          </ion-tab-button>
        </ion-tab-bar>

        <ion-tab tab="control"></ion-tab>
        <ion-tab tab="listen"></ion-tab>

        <!-- settings page -->
        <ion-tab tab="settings">
          <ion-header>
            <ion-toolbar>
              <ion-title size="large"> Settings </ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content class="ion-padding">
            <div id="debug-info" class="ion-text-center"></div>
            <ion-list>
              <ion-item-group>
                <ion-item-divider color="tertiary">
                  <ion-icon name="person-circle" slot="start"></ion-icon>
                  <ion-label>Account Sign-In</ion-label>
                </ion-item-divider>
                <ion-item lines="none">
                  <ion-label>
                    <h3 id="auth-status">Sign-in unavailable</h3>
                    <p id="auth-hint">
                      Sign in to load the accounts and players you can manage.
                    </p>
                    <p id="auth-identity" class="auth-identity"></p>
                  </ion-label>
                </ion-item>
                <ion-item
                  lines="none"
                  class="auth-actions-item"
                  id="auth-actions-item"
                  hidden
                >
                  <div id="auth-actions" class="auth-actions"></div>
                </ion-item>
              </ion-item-group>
            </ion-list>
            <ion-list id="settings-list"></ion-list>
            <ion-button id="settings-save-button" expand="block"
              >Save</ion-button
            >
          </ion-content>
        </ion-tab>
      </ion-tabs>
      <ion-toast id="global-toast"></ion-toast>
    </ion-app>

    <template id="tab-player">
      <ion-header>
        <ion-toolbar>
          <ion-title size="large">
            <span class="stations-name"></span>:
            <span class="now-playing">...</span>
          </ion-title>
          <ion-buttons slot="end">
            <ion-button
              shape="round"
              size="small"
              color="danger"
              disabled="true"
              class="stop-button"
              aria-label="Stop playback"
            >
              <ion-icon slot="icon-only" name="stop"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <div class="radio-info ion-text-center"></div>
        <ion-grid class="station-grid"></ion-grid>
      </ion-content>
    </template>
  </body>
</html>
